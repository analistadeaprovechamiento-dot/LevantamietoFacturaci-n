<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bioagrícola - Levantamiento de Predios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        /* ESTILOS GLOBALES - Tipografía Arial y Paleta Bioagrícola */
        body { 
            font-family: Arial, sans-serif; /* Usamos Arial */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f9fafb; /* Gris muy ligero */
            padding: 0; 
            margin: 0; 
            color: #333;
        }

        /* 1. ESTILO DE ENCABEZADO (Basado en la imagen compartida) */
        .main-header {
            width: 100%;
            background-color: #ffffff;
            border-bottom: 2px solid #288041; /* Línea verde superior */
            padding: 15px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .logo-img {
            height: 50px; /* Tamaño del logo proporcionado */
            margin-right: 25px;
        }

        .title-container {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            color: #288041; /* Verde corporativo del título */
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 4px 0;
        }

        .main-subtitle {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        /* 2. DISEÑO DEL LIENZO (CARD SUPER FLUIDA) */
        #canvas-wrapper {
            background: #ffffff;
            /* Estilo de tarjeta con borde izquierdo verde */
            border-left: 6px solid #288041;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); /* Sombra suave y fluida */
            margin-top: 30px;
            margin-bottom: 30px;
            overflow: hidden; /* Mantiene todo limpio */
            transition: all 0.3s ease; /* Transiciones fluidas */
        }

        /* 3. BARRA DE HERRAMIENTAS (PANEL LATERAL PARA FLUIDEZ) */
        .tools-panel {
            background-color: #f4f6f8;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        .canvas-container-flex {
            display: flex;
            align-items: flex-start;
        }

        /* 4. BOTONES Y CONTROLES (Estilo sobrio Arial) */
        .tools-title {
            font-weight: bold;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-weight: 600; 
            font-size: 13px; 
            font-family: Arial, sans-serif; /* Arial en botones */
            transition: all 0.2s ease; 
            background-color: #fff;
            color: #333;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background-color: #f0f0f0; border-color: #bbb; transform: translateX(2px); }
        
        /* Botones especiales */
        .btn-green-corp { background-color: #288041; color: white; border: none; font-weight: bold; justify-content: center; text-align: center; }
        .btn-green-corp:hover { background-color: #1e6031; transform: translateY(-1px); }
        
        .btn-light-green { background-color: #e8f5e9; color: #2E7D32; border: 1px solid #c8e6c9; font-weight: bold; text-align: center; justify-content: center; }
        .btn-light-green:hover { background-color: #c8e6c9; }
        
        .btn-red-outline { background-color: #fff; color: #d32f2f; border: 1px solid #d32f2f; font-weight: bold; text-align: center; justify-content: center; }
        .btn-red-outline:hover { background-color: #ffebee; }

        select {
            padding: 10px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #333;
            width: 100%;
            background-color: #fff;
        }

        .divider { border-top: 1px solid #e0e0e0; margin: 10px 0; }

        /* 5. MENÚ CONTEXTUAL (Sutileza Arial) */
        #context-menu {
            display: none;
            position: fixed;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            z-index: 100000;
            width: 180px;
            border-radius: 4px;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #context-menu div {
            padding: 11px 15px;
            cursor: pointer;
            color: #444;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #context-menu div:hover { background-color: #e8f5e9; color: #288041; }
        #context-menu .menu-header { background-color: #f5f5f5; color: #333; font-weight: bold; cursor: default; border-bottom: 2px solid #ddd; }
        #context-menu .menu-header:hover { background-color: #f5f5f5; color: #333; }
    </style>
</head>

                <option value="">-- Seleccionar --</option>
                <option value="casa_sencilla">🏠 Casa Sencilla</option>
                <option value="casa_garaje">🚗 Casa con Garaje</option>
                <option value="personalizada">⭐ Mi Plantilla Guardada</option>
            </select>
            <button class="btn-light-green" onclick="cargarPlantilla()">Cargar Plano</button>
            <button onclick="guardarPlantillaPersonalizada()" title="Guardar diseño actual">⭐ Guardar Actual</button>
            
            <div class="divider"></div>
            
            <button class="btn-red-outline" onclick="limpiarHoja()">🗑️ Limpiar Todo</button>
            <button class="btn-green-corp" onclick="exportar()">💾 EXPORTAR PNG</button>
        </aside>

        <main id="canvas-wrapper">
            <canvas id="c" width="950" height="600" style="background-color: #ffffff;"></canvas>
            
            <div id="context-menu">
                <div class="menu-header">OPCIONES</div>
                <div onclick="ejecutarAccion('frente')">Traer al frente <span>▲</span></div>
                <div onclick="ejecutarAccion('subir')">Subir nivel <span>△</span></div>
                <div onclick="ejecutarAccion('bajar')">Bajar nivel <span>▽</span></div>
                <div onclick="ejecutarAccion('fondo')">Enviar al fondo <span>▼</span></div>
                <div onclick="ejecutarAccion('clonar')">Duplicar <span>📋</span></div>
                <div onclick="ejecutarAccion('borrar')" style="color: #d32f2f; font-weight: bold;">Eliminar (Del) <span>🗑️</span></div>
            </div>
        </main>
    </div>

    <script>
        var canvas;
        var selectedObject = null;
        var menu = document.getElementById('context-menu');

        // Configuración Arial Estándar para textos de Fabric
        const FUENTE_ARIAL = 'Arial, sans-serif';

        window.onload = function() {
            canvas = new fabric.Canvas('c', {
                fireRightClick: true,
                stopContextMenu: true,
                preserveObjectStacking: true, // Crucial para la fluidez de capas
                backgroundColor: '#ffffff' // Fondo blanco Arial
            });

            // Mejorar la puntería en objetos pequeños (puertas)
            fabric.Object.prototype.perPixelTargetFind = true;
            fabric.Object.prototype.targetFindTolerance = 4;
            // Estilo de controles más flúido
            fabric.Object.prototype.set({
                borderColor: '#288041',
                cornerColor: '#288041',
                cornerStyle: 'circle',
                cornerSize: 8,
                transparentCorners: false
            });

            // Manejo del menú contextual (clic derecho)
            canvas.on('mouse:down', function(options) {
                if (options.button === 3) { // Clic derecho
                    if (options.target) {
                        selectedObject = options.target;
                        canvas.setActiveObject(selectedObject);
                        
                        menu.style.display = 'block';
                        menu.style.left = options.e.clientX + 'px';
                        menu.style.top = options.e.clientY + 'px';
                    }
                } else {
                    menu.style.display = 'none';
                }
            });
        };

        // Acciones del menú contextual
        function ejecutarAccion(tipo) {
            if (!selectedObject) return;

            switch(tipo) {
                case 'frente': selectedObject.bringToFront(); break;
                case 'fondo': selectedObject.sendToBack(); break;
                case 'subir': selectedObject.bringForward(); break;
                case 'bajar': selectedObject.sendBackwards(); break;
                case 'borrar': 
                    canvas.remove(selectedObject); 
                    canvas.discardActiveObject();
                    break;
                case 'clonar':
                    selectedObject.clone(function(cloned) {
                        cloned.set({ left: selectedObject.left + 20, top: selectedObject.top + 20 });
                        canvas.add(cloned);
                        canvas.setActiveObject(cloned);
                    });
                    break;
            }
            canvas.renderAll();
            menu.style.display = 'none';
        }

        // --- FUNCIONES DE DIBUJO (Todo con Arial y fluidez) ---
        function addIsoBlock(type) {
            let w = (type === 'full') ? 200 : 100;
            // Trazo Arial gris oscuro para limpieza
            const f = new fabric.Rect({ width: w, height: 100, fill: '#fff', stroke: '#444', strokeWidth: 2 });
            const s = new fabric.Polygon([{x:w,y:0},{x:w+60,y:-40},{x:w+60,y:60},{x:w,y:100}], {fill:'#f0f0f0', stroke:'#444', strokeWidth:2});
            const t = new fabric.Polygon([{x:0,y:0},{x:60,y:-40},{x:w+60,y:-40},{x:w,y:0}], {fill:'#fcfcfc', stroke:'#444', strokeWidth:2});
            const group = new fabric.Group([f, s, t], { left: 150, top: 150 });
            canvas.add(group);
            canvas.sendToBack(group); // Capa base flúida
            canvas.setActiveObject(group);
        }

        function addDivider() {
            canvas.add(new fabric.Line([0, 0, 0, 100], { stroke: '#444', strokeWidth: 2, left: 250, top: 200, strokeDashArray: [5, 5] }));
        }

        function addDoor() {
            const door = new fabric.Rect({ width: 35, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2, left: 180, top: 190 });
            canvas.add(door);
            door.bringToFront();
            canvas.setActiveObject(door);
        }

        function addGarage() {
            const frame = new fabric.Rect({ width: 80, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2 });
            const line = new fabric.Line([0, 15, 80, 15], { stroke: '#444', strokeWidth: 1 });
            const garage = new fabric.Group([frame, line], { left: 160, top: 190 });
            canvas.add(garage);
            garage.bringToFront();
            canvas.setActiveObject(garage);
        }

        function addStairs() {
            const steps = [];
            for(let i=0; i<3; i++) {
                steps.push(new fabric.Rect({ width: 40, height: 8, fill: '#fff', stroke: '#444', top: i*8 }));
            }
            const stairs = new fabric.Group(steps, { left: 250, top: 220 });
            canvas.add(stairs);
            stairs.bringToFront();
            canvas.setActiveObject(stairs);
        }

        function addText() {
            // Texto explícito Arial y color corporativo flúido
            const txt = new fabric.IText('Etiqueta Arial', { 
                left: 200, 
                top: 160, 
                fontSize: 16, 
                fontFamily: FUENTE_ARIAL, 
                fontWeight: 'bold', 
                fill: '#288041' 
            });
            canvas.add(txt);
            txt.bringToFront();
            canvas.setActiveObject(txt);
        }

        // --- FUNCIÓN DE LIMPIEZA TOTAL (Para fluidificar el inicio) ---
        function limpiarHoja() {
            if(confirm("¿Estás seguro de que deseas limpiar todo el plano? No se puede deshacer.")) {
                canvas.clear();
                // Restaurar fondo blanco tras limpieza
                canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
            }
        }

        // --- FUNCIONES DE PLANTILLAS (Todo con Arial corporativo) ---
        function cargarPlantilla() {
            const seleccion = document.getElementById('selector-plantilla').value;
            if (!seleccion) {
                alert("Por favor, selecciona una plantilla.");
                return;
            }

            if(confirm("¿Deseas limpiar el área de trabajo antes de cargar la plantilla flúida?")) {
                canvas.clear();
                canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
            }

            if (seleccion === 'casa_sencilla') {
                let w = 200;
                const f = new fabric.Rect({ width: w, height: 100, fill: '#fff', stroke: '#444', strokeWidth: 2 });
                const s = new fabric.Polygon([{x:w,y:0},{x:w+60,y:-40},{x:w+60,y:60},{x:w,y:100}], {fill:'#f0f0f0', stroke:'#444', strokeWidth:2});
                const t = new fabric.Polygon([{x:0,y:0},{x:60,y:-40},{x:w+60,y:-40},{x:w,y:0}], {fill:'#fcfcfc', stroke:'#444', strokeWidth:2});
                const bloqueCasa = new fabric.Group([f, s, t], { left: 150, top: 150 });
                
                const puerta = new fabric.Rect({ width: 35, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2, left: 230, top: 190 });
                const texto = new fabric.IText('Casa Estándar (Arial)', { left: 160, top: 160, fontSize: 16, fontFamily: FUENTE_ARIAL, fontWeight: 'bold', fill: '#288041' });

                canvas.add(bloqueCasa, puerta, texto);
                bloqueCasa.sendToBack(); 
            } 
            else if (seleccion === 'casa_garaje') {
                let w = 300;
                const f = new fabric.Rect({ width: w, height: 100, fill: '#fff', stroke: '#444', strokeWidth: 2 });
                const s = new fabric.Polygon([{x:w,y:0},{x:w+60,y:-40},{x:w+60,y:60},{x:w,y:100}], {fill:'#f0f0f0', stroke:'#444', strokeWidth:2});
                const t = new fabric.Polygon([{x:0,y:0},{x:60,y:-40},{x:w+60,y:-40},{x:w,y:0}], {fill:'#fcfcfc', stroke:'#444', strokeWidth:2});
                const bloqueCasa = new fabric.Group([f, s, t], { left: 100, top: 150 });

                const frameG = new fabric.Rect({ width: 80, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2 });
                const lineG = new fabric.Line([0, 15, 80, 15], { stroke: '#444', strokeWidth: 1 });
                const garaje = new fabric.Group([frameG, lineG], { left: 120, top: 190 });

                const puerta = new fabric.Rect({ width: 35, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2, left: 260, top: 190 });
                const texto = new fabric.IText('Casa con Garaje (Arial)', { left: 120, top: 160, fontSize: 16, fontFamily: FUENTE_ARIAL, fontWeight: 'bold', fill: '#288041' });

                canvas.add(bloqueCasa, garaje, puerta, texto);
                bloqueCasa.sendToBack();
            }
            else if (seleccion === 'personalizada') {
                const diseñoGuardado = localStorage.getItem('mi_plantilla_bioagricola');
                if (diseñoGuardado) {
                    // Carga fluida desde JSON Arial
                    canvas.loadFromJSON(diseñoGuardado, function() {
                        canvas.renderAll();
                    });
                } else {
                    alert("No tienes plantilla personalizada guardada.");
                }
            }

            document.getElementById('selector-plantilla').value = "";
        }

        function guardarPlantillaPersonalizada() {
            if (canvas.getObjects().length === 0) {
                alert("El lienzo está vacío.");
                return;
            }
            const diseñoJSON = JSON.stringify(canvas.toJSON());
            localStorage.setItem('mi_plantilla_bioagricola', diseñoJSON);
            alert("¡Plantilla Arial corporativa guardada con éxito!");
        }

        function exportar() {
            canvas.discardActiveObject().renderAll();
            const link = document.createElement('a');
            link.download = 'Levantamiento_Predio_Arial.png';
            link.href = canvas.toDataURL({ format: 'png', multiplier: 2 });
            link.click();
        }

        // --- SOLUCIÓN DE TECLADO (Delete/Backspace) ---
        document.addEventListener('keydown', (e) => {
            const obj = canvas.getActiveObject();
            
            // Fluidez: si estamos editando texto Arial, no borrar el objeto completo
            if (obj && obj.isEditing) return;

            // PREVENIR BACKSPACE (Navegación atrás) - Crucial para fluidez
            if(e.key === "Backspace") {
                // Solo prevenir si hay objeto seleccionado o no estamos en input
                if (obj || e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                }
            }

            if (!obj) return;
            
            // Prevenir scroll de la página con flechas Arial
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            // --- ELIMINAR CON TECLAS CORRECTAS (Fluidez Total) ---
            // 'Delete' es Suprimir, 'Backspace' es Retroceso
            if(e.key === "Delete" || e.key === "Backspace") {
                canvas.remove(obj);
                canvas.discardActiveObject();
                canvas.renderAll();
                return; // Fluidez: detener ejecución
            }

            // Movimiento flúido con flechas
            const step = 5; 
            if(e.key === "ArrowUp") obj.top -= step;
            if(e.key === "ArrowDown") obj.top += step;
            if(e.key === "ArrowLeft") obj.left -= step;
            if(e.key === "ArrowRight") obj.left += step;
            obj.setCoords();
            canvas.renderAll();
        });
    </script>
</body>
</html>
