<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bioagrícola - Levantamiento de Predios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f9fafb; padding: 0; margin: 0; color: #333; }
        
        .main-header { width: 100%; background-color: #ffffff; border-bottom: 2px solid #288041; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header-left { display: flex; align-items: center; }
        .logo-img { height: 50px; margin-right: 25px; }
        .main-title { color: #288041; font-size: 24px; font-weight: bold; margin: 0 0 4px 0; }
        .main-subtitle { color: #666; font-size: 14px; margin: 0; }
        
        .google-auth-btn { background-color: #4285F4; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: background-color 0.2s;}
        .google-auth-btn:hover { background-color: #3367D6; }
        
        .user-info { display: none; align-items: center; gap: 12px; font-size: 14px; color: #333; font-weight: bold; background: #f4f6f8; padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid #e0e0e0;}
        .user-profile-pic { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #288041; }
        .btn-logout { background-color: transparent; border: none; color: #d32f2f; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 10px; text-decoration: underline;}
        
        .canvas-container-flex { display: flex; align-items: flex-start; width: 100%; max-width: 1300px; padding: 20px; box-sizing: border-box; gap: 20px;}
        .tools-panel { background-color: #f4f6f8; border: 1px solid #e0e0e0; border-radius: 6px; display: flex; flex-direction: column; gap: 12px; padding: 20px; box-sizing: border-box; min-width: 250px; }
        #canvas-wrapper { background: #ffffff; border-left: 6px solid #288041; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }

        .tools-title { font-weight: bold; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; margin-top: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; font-weight: 600; font-size: 13px; background-color: #fff; text-align: left; transition: 0.2s; }
        button:hover { background-color: #f0f0f0; }
        
        .btn-cloud { background-color: #e3f2fd; color: #1565c0; border-color: #90caf9; font-weight: bold;}
        .btn-cloud:hover { background-color: #bbdefb; }
        .btn-cloud:disabled { background-color: #f5f5f5; color: #aaa; border-color: #ddd; cursor: not-allowed; }
        .btn-green-corp { background-color: #288041; color: white; border: none; text-align: center; }
        .btn-green-corp:hover { background-color: #1e6031; }
        .btn-red-outline { color: #d32f2f; border-color: #d32f2f; text-align: center;}
        
        .divider { border-top: 1px solid #e0e0e0; margin: 5px 0; }
        
        /* Menú Contextual */
        #context-menu { display: none; position: fixed; background: white; border: 1px solid #ccc; box-shadow: 3px 5px 15px rgba(0,0,0,0.15); z-index: 100000; width: 180px; border-radius: 4px; }
        #context-menu div { padding: 11px 15px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        #context-menu div:hover { background-color: #e8f5e9; color: #288041; }

        /* Estilos de Ventanas Emergentes (Modals) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; border-radius: 8px; width: 400px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 6px solid #288041; }
        .modal-title { margin: 0 0 15px 0; color: #288041; font-size: 20px; font-weight: bold; }
        .modal-body { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .modal-body label { font-weight: bold; font-size: 13px; color: #555; margin-bottom: -10px; }
        .modal-body input[type="text"], .modal-body select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: Arial; font-size: 14px; width: 100%; box-sizing: border-box;}
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <div class="title-container">
                <h1 class="main-title">Levantamiento de Predios</h1>
                <p class="main-subtitle">Herramienta Técnica con sincronización en la Nube</p>
            </div>
        </div>
        <div>
            <button id="btn-login" class="google-auth-btn" onclick="handleAuthClick()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="Google"> 
                Iniciar sesión
            </button>
            <div id="user-profile" class="user-info">
                <img id="user-pic" src="" alt="Foto" class="user-profile-pic">
                <span id="user-name">Usuario</span>
                <button class="btn-logout" onclick="handleSignoutClick()" title="Cerrar sesión">Salir</button>
            </div>
        </div>
    </header>

    <div class="canvas-container-flex">
        <aside class="tools-panel">
            <div class="tools-title">Estructuras</div>
            <button onclick="addIsoBlock('full')">🧱 Bloque Piso</button>
            <button onclick="addDivider()">📏 Línea Divisoria</button>
            <button onclick="addStairs()">🪜 Escaleras</button>
            
            <div class="tools-title">Aberturas</div>
            <button onclick="addDoor()">🚪 Puerta</button>
            <button onclick="addGarage()">🚗 Garaje</button>
            
            <div class="tools-title">Anotaciones</div>
            <button onclick="addText()">📝 Etiqueta</button>
            
            <div class="divider"></div>
            
            <div class="tools-title">Nube (Drive)</div>
            <button id="btn-save-cloud" class="btn-cloud" onclick="abrirModalGuardar()" disabled>☁️ Guardar / Crear Plantilla</button>
            <button id="btn-load-cloud" class="btn-cloud" onclick="cargarDeDrive()" disabled>📂 Abrir Predio / Plantilla</button>
            
            <div class="divider"></div>
            
            <button class="btn-red-outline" onclick="limpiarHoja()">🗑️ Limpiar Plano</button>
            <button class="btn-green-corp" onclick="exportarLocal()">💾 Descargar Local (Opcional)</button>
        </aside>

        <main id="canvas-wrapper">
            <canvas id="c" width="950" height="600"></canvas>
            <div id="context-menu">
                <div class="menu-header">OPCIONES</div>
                <div onclick="ejecutarAccion('frente')">Traer al frente <span>▲</span></div>
                <div onclick="ejecutarAccion('fondo')">Enviar al fondo <span>▼</span></div>
                <div onclick="borrarSeleccion()" style="color: red; font-weight: bold;">Eliminar (Del) <span>🗑️</span></div>
            </div>
        </main>
    </div>

    <div id="modal-guardar" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Guardar en Google Drive</h3>
            <div class="modal-body">
                <label>Nombre del Archivo / Plantilla</label>
                <input type="text" id="input-nombre-guardar" placeholder="Ej: Local + Vivienda" autocomplete="off">
                
                <label>Tipo de Guardado</label>
                <select id="select-tipo-guardar">
                    <option value="predio">🏠 Plano Terminado (Guarda PNG y Editable)</option>
                    <option value="privada">🔒 Plantilla: Solo para mí</option>
                    <option value="publica">🌍 Plantilla: Para Todos (Compartida)</option>
                </select>
            </div>
            <div class="modal-footer">
                <button onclick="cerrarModal('modal-guardar')" class="btn-red-outline">Cancelar</button>
                <button onclick="ejecutarGuardado()" class="btn-green-corp" id="btn-confirmar-guardar">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-cargar" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Abrir desde Google Drive</h3>
            <div class="modal-body">
                <label>Selecciona el plano o plantilla:</label>
                <select id="select-lista-archivos" size="6" style="height: 150px; overflow-y: auto;">
                    </select>
            </div>
            <div class="modal-footer">
                <button onclick="cerrarModal('modal-cargar')" class="btn-red-outline">Cancelar</button>
                <button onclick="ejecutarCarga()" class="btn-green-corp" id="btn-confirmar-cargar">Abrir</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN GOOGLE DRIVE ---
        const CLIENT_ID = '219065377908-q25e1iqqu0mejkd8gg2lfn24h7hrogq3.apps.googleusercontent.com';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile'; 

        let tokenClient, driveAccessToken = null;

        function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] }); }); }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) throw (tokenResponse);
                    driveAccessToken = tokenResponse.access_token;
                    obtenerPerfilUsuario(driveAccessToken);
                },
            });
        }

        function handleAuthClick() { if (tokenClient) tokenClient.requestAccessToken({prompt: 'consent'}); }
        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token) { google.accounts.oauth2.revoke(token.access_token); gapi.client.setToken(''); }
            driveAccessToken = null; actualizarUI(false);
        }

        async function obtenerPerfilUsuario(token) {
            try {
                const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { 'Authorization': `Bearer ${token}` }});
                const data = await res.json();
                document.getElementById('user-pic').src = data.picture; document.getElementById('user-name').innerText = data.name;
                actualizarUI(true);
            } catch(e) { actualizarUI(true); }
        }

        function actualizarUI(logeado) {
            document.getElementById('btn-login').style.display = logeado ? 'none' : 'flex';
            document.getElementById('user-profile').style.display = logeado ? 'flex' : 'none';
            document.getElementById('btn-save-cloud').disabled = !logeado; document.getElementById('btn-load-cloud').disabled = !logeado;
        }

        // --- 2. GESTIÓN DE CARPETAS Y ARCHIVOS ---
        async function obtenerCrearCarpeta(nombreCarpeta) {
            try {
                let res = await gapi.client.drive.files.list({ q: `mimeType='application/vnd.google-apps.folder' and name='${nombreCarpeta}' and trashed=false`, fields: 'files(id, name)' });
                if (res.result.files && res.result.files.length > 0) return res.result.files[0].id;
                
                let createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST', headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ name: nombreCarpeta, mimeType: 'application/vnd.google-apps.folder' })
                });
                return (await createRes.json()).id;
            } catch (err) { console.error(err); return null; }
        }

        async function subirArchivoADrive(blob, metadatos, hacerPublico = false) {
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadatos)], { type: 'application/json' }));
            form.append('file', blob);
            
            let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken }), body: form
            });
            let data = await res.json();

            // Si es plantilla "Para todos", configuramos el permiso de lectura global
            if(hacerPublico && data.id) {
                await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
                    method: 'POST', headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ role: 'reader', type: 'anyone' })
                });
            }
        }

        // --- MODALES (Ventanas Emergentes) ---
        function abrirModalGuardar() {
            document.getElementById('input-nombre-guardar').value = "";
            document.getElementById('modal-guardar').style.display = "flex";
        }

        function cerrarModal(id) { document.getElementById(id).style.display = "none"; }

        async function ejecutarGuardado() {
            const nombre = document.getElementById('input-nombre-guardar').value.trim();
            const tipo = document.getElementById('select-tipo-guardar').value;
            const btn = document.getElementById('btn-confirmar-guardar');
            
            if (!nombre) return alert("Por favor escribe un nombre.");
            btn.innerText = "Guardando..."; btn.disabled = true;

            try {
                let folderName = (tipo === "predio") ? "Planos Levantamientos" : (tipo === "privada" ? "Mis Plantillas" : "Plantillas Compartidas");
                const folderId = await obtenerCrearCarpeta(folderName);

                const jsonData = JSON.stringify(canvas.toJSON());
                const jsonBlob = new Blob([jsonData], { type: 'application/json' });
                const jsonMeta = { name: `${nombre}.json`, mimeType: 'application/json', parents: [folderId] };

                // Guardar JSON (Siempre)
                await subirArchivoADrive(jsonBlob, jsonMeta, tipo === "publica");

                // Si es plano terminado, guarda el PNG también
                if(tipo === "predio") {
                    canvas.discardActiveObject().renderAll(); 
                    const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
                    const pngBlob = await (await fetch(dataURL)).blob();
                    const pngMeta = { name: `${nombre}.png`, mimeType: 'image/png', parents: [folderId] };
                    await subirArchivoADrive(pngBlob, pngMeta);
                }

                alert(`¡Guardado exitoso en la carpeta '${folderName}' de tu Google Drive!`);
                cerrarModal('modal-guardar');
            } catch (err) { alert("Hubo un error al guardar."); console.error(err); }
            
            btn.innerText = "Guardar"; btn.disabled = false;
        }

        async function cargarDeDrive() {
            if (!driveAccessToken) return;
            const btn = document.getElementById('btn-load-cloud');
            btn.innerText = "📂 Buscando...";
            
            try {
                // Busca TODOS los JSON accesibles (privados y compartidos)
                let response = await gapi.client.drive.files.list({
                    pageSize: 50, fields: 'files(id, name)', q: "mimeType='application/json' and trashed=false"
                });
                
                const files = response.result.files;
                if (!files || files.length == 0) { alert('No tienes plantillas ni planos guardados aún.'); btn.innerText = "📂 Abrir Predio / Plantilla"; return; }
                
                // Llenar el modal
                const selectBox = document.getElementById('select-lista-archivos');
                selectBox.innerHTML = "";
                files.forEach(f => {
                    let option = document.createElement("option");
                    option.value = f.id; option.text = f.name.replace('.json', '');
                    selectBox.appendChild(option);
                });
                
                document.getElementById('modal-cargar').style.display = "flex";
            } catch (err) { alert("Error al intentar leer Google Drive."); }
            btn.innerText = "📂 Abrir Predio / Plantilla";
        }

        async function ejecutarCarga() {
            const selectBox = document.getElementById('select-lista-archivos');
            const fileId = selectBox.value;
            const fileName = selectBox.options[selectBox.selectedIndex]?.text;
            const btn = document.getElementById('btn-confirmar-cargar');

            if(!fileId) return alert("Selecciona un archivo de la lista.");
            
            btn.innerText = "Abriendo..."; btn.disabled = true;
            try {
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken })
                });
                const jsonPlano = await fileRes.text();
                canvas.loadFromJSON(jsonPlano, function() {
                    canvas.renderAll();
                    alert(`¡${fileName} cargado exitosamente!`);
                    cerrarModal('modal-cargar');
                });
            } catch(e) { alert("Error al descargar el archivo."); }
            btn.innerText = "Abrir"; btn.disabled = false;
        }

        // --- 3. LÓGICA DE DIBUJO (ELIMINACIÓN MÚLTIPLE) ---
        var canvas, selectedObject = null, menu = document.getElementById('context-menu');

        window.onload = function() {
            canvas = new fabric.Canvas('c', { fireRightClick: true, stopContextMenu: true, backgroundColor: '#ffffff' });
            fabric.Object.prototype.perPixelTargetFind = true;
            
            canvas.on('mouse:down', function(options) {
                if (options.button === 3 && options.target) {
                    selectedObject = options.target;
                    menu.style.display = 'block'; menu.style.left = options.e.clientX + 'px'; menu.style.top = options.e.clientY + 'px';
                } else menu.style.display = 'none';
            });
        };

        // NUEVA FUNCIÓN: Borrar múltiples elementos
        function borrarSeleccion() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
                canvas.renderAll();
            } else if (selectedObject) { // Por si se usó el clic derecho
                canvas.remove(selectedObject);
                canvas.discardActiveObject();
                canvas.renderAll();
            }
            menu.style.display = 'none';
        }

        function ejecutarAccion(tipo) {
            if (!selectedObject) return;
            if (tipo === 'frente') selectedObject.bringToFront();
            if (tipo === 'fondo') selectedObject.sendToBack();
            canvas.renderAll(); menu.style.display = 'none';
        }

        function addIsoBlock() { const f = new fabric.Rect({ width: 200, height: 100, fill: '#fff', stroke: '#444', strokeWidth: 2 }); const s = new fabric.Polygon([{x:200,y:0},{x:260,y:-40},{x:260,y:60},{x:200,y:100}], {fill:'#f0f0f0', stroke:'#444', strokeWidth:2}); const t = new fabric.Polygon([{x:0,y:0},{x:60,y:-40},{x:260,y:-40},{x:200,y:0}], {fill:'#fcfcfc', stroke:'#444', strokeWidth:2}); const group = new fabric.Group([f, s, t], { left: 150, top: 150 }); canvas.add(group); canvas.sendToBack(group); }
        function addDivider() { canvas.add(new fabric.Line([0, 0, 0, 100], { stroke: '#444', strokeWidth: 2, left: 250, top: 200, strokeDashArray: [5, 5] })); }
        function addDoor() { canvas.add(new fabric.Rect({ width: 35, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2, left: 180, top: 190 })); }
        function addGarage() { const g = new fabric.Group([new fabric.Rect({ width: 80, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2 }), new fabric.Line([0, 15, 80, 15], { stroke: '#444', strokeWidth: 1 })], { left: 160, top: 190 }); canvas.add(g); }
        function addStairs() { const steps = [0,1,2].map(i => new fabric.Rect({ width: 40, height: 8, fill: '#fff', stroke: '#444', top: i*8 })); canvas.add(new fabric.Group(steps, { left: 250, top: 220 })); }
        function addText() { canvas.add(new fabric.IText('Etiqueta', { left: 200, top: 160, fontSize: 16, fontFamily: 'Arial', fontWeight: 'bold', fill: '#288041' })); }
        
        function limpiarHoja() { if(confirm("¿Limpiar todo el lienzo?")) { canvas.clear(); canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas)); } }
        function exportarLocal() { canvas.discardActiveObject().renderAll(); const link = document.createElement('a'); link.download = 'Plano_Local.png'; link.href = canvas.toDataURL({ format: 'png', multiplier: 2 }); link.click(); }

        // Eventos de Teclado Actualizados (Soporta múltiples objetos)
        document.addEventListener('keydown', (e) => {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.isEditing) return;
            if (e.key === "Backspace" && e.target.tagName !== 'INPUT') e.preventDefault();
            
            // Eliminar múltiple con Delete o Backspace
            if (e.key === "Delete" || e.key === "Backspace") { borrarSeleccion(); return; }
            
            if (!activeObj) return;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
            
            const step = 5; 
            if(e.key === "ArrowUp") activeObj.top -= step; if(e.key === "ArrowDown") activeObj.top += step; if(e.key === "ArrowLeft") activeObj.left -= step; if(e.key === "ArrowRight") activeObj.left += step;
            activeObj.setCoords(); canvas.renderAll();
        });
    </script>
</body>
</html>
