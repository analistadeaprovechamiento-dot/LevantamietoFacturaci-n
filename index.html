    <title>Bioagrícola - Levantamiento de Predios</title>

    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f9fafb; padding: 0; margin: 0; color: #333; }
        
        /* Encabezado */
        .main-header { width: 100%; background-color: #ffffff; border-bottom: 2px solid #288041; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header-left { display: flex; align-items: center; }
        .logo-img { height: 50px; margin-right: 25px; }
        .main-title { color: #288041; font-size: 24px; font-weight: bold; margin: 0 0 4px 0; }
        .main-subtitle { color: #666; font-size: 14px; margin: 0; }
        
        /* Botón de Google */
        .google-auth-btn { background-color: #4285F4; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .google-auth-btn:hover { background-color: #3367D6; }
        .user-info { display: none; align-items: center; gap: 15px; font-size: 14px; color: #333; font-weight: bold; }
        .btn-logout { background-color: #f5f5f5; border: 1px solid #ccc; padding: 6px 12px; cursor: pointer; border-radius: 4px; }

        /* Contenedores */
        .canvas-container-flex { display: flex; align-items: flex-start; width: 100%; max-width: 1300px; padding: 20px; box-sizing: border-box; gap: 20px;}
        .tools-panel { background-color: #f4f6f8; border: 1px solid #e0e0e0; border-radius: 6px; display: flex; flex-direction: column; gap: 12px; padding: 20px; box-sizing: border-box; min-width: 250px; }
        #canvas-wrapper { background: #ffffff; border-left: 6px solid #288041; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }

        /* Botones y UI */
        .tools-title { font-weight: bold; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; margin-top: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; font-weight: 600; font-size: 13px; background-color: #fff; text-align: left; }
        button:hover { background-color: #f0f0f0; }
        
        .btn-cloud { background-color: #e3f2fd; color: #1565c0; border-color: #90caf9; }
        .btn-cloud:hover { background-color: #bbdefb; }
        .btn-green-corp { background-color: #288041; color: white; border: none; text-align: center; }
        .btn-red-outline { color: #d32f2f; border-color: #d32f2f; text-align: center;}
        
        .divider { border-top: 1px solid #e0e0e0; margin: 5px 0; }
        #context-menu { display: none; position: fixed; background: white; border: 1px solid #ccc; box-shadow: 3px 5px 15px rgba(0,0,0,0.15); z-index: 100000; width: 180px; border-radius: 4px; }
        #context-menu div { padding: 11px 15px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        #context-menu div:hover { background-color: #e8f5e9; color: #288041; }
    </style>
</head>

    <div class="canvas-container-flex">
        <aside class="tools-panel">
            <div class="tools-title">Estructuras</div>
            <button onclick="addIsoBlock('full')">🧱 Bloque Piso</button>
            <button onclick="addDivider()">📏 Línea Divisoria</button>
            <button onclick="addStairs()">🪜 Escaleras</button>
            
            <div class="tools-title">Aberturas</div>
            <button onclick="addDoor()">🚪 Puerta</button>
            <button onclick="addGarage()">🚗 Garaje</button>
            
            <div class="tools-title">Anotaciones</div>
            <button onclick="addText()">📝 Etiqueta</button>
            
            <div class="divider"></div>
            
            <div class="tools-title">Nube (Google Drive)</div>
            <button id="btn-save-cloud" class="btn-cloud" onclick="guardarEnDrive()" disabled>☁️ Guardar en Drive</button>
            <button id="btn-load-cloud" class="btn-cloud" onclick="cargarDeDrive()" disabled>📂 Abrir desde Drive</button>
            
            <div class="divider"></div>
            
            <button class="btn-red-outline" onclick="limpiarHoja()">🗑️ Limpiar Plano</button>
            <button class="btn-green-corp" onclick="exportar()">💾 Exportar PNG</button>

            <canvas id="c" width="950" height="600"></canvas>
            
            <div id="context-menu">

                <div onclick="ejecutarAccion('borrar')" style="color: red; font-weight: bold;">Eliminar (Del) <span>🗑️</span></div>
            </div>
        </main>
    </div>

        let gisInited = false;
        let driveAccessToken = null;

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] });
            gapiInited = true;
            checkReady();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        throw (tokenResponse);
                    }
                    driveAccessToken = tokenResponse.access_token;
                    actualizarUI(true);
                },
            });
            gisInited = true;
            checkReady();
        }

        function checkReady() {
            // Listo para usarse
        }

        function handleAuthClick() {
            if (!tokenClient) return alert("Google API aún no carga, espera un segundo.");
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
                driveAccessToken = null;
                actualizarUI(false);
            }
        }

        function actualizarUI(logeado) {
            document.getElementById('btn-login').style.display = logeado ? 'none' : 'flex';
            document.getElementById('user-profile').style.display = logeado ? 'flex' : 'none';
            document.getElementById('btn-save-cloud').disabled = !logeado;
            document.getElementById('btn-load-cloud').disabled = !logeado;
        }

        // --- 2. LÓGICA DE DRIVE (Guardar y Cargar) ---
        async function guardarEnDrive() {
            if (!driveAccessToken) return alert("Debes iniciar sesión primero.");
            
            const nombreArchivo = prompt("Ingresa el nombre del Predio para guardarlo en la Nube:", "Predio_Nuevo");
            if (!nombreArchivo) return;

            const jsonData = JSON.stringify(canvas.toJSON());
            const file = new Blob([jsonData], { type: 'application/json' });
            
            const metadata = {
                name: `${nombreArchivo}.json`,
                mimeType: 'application/json'
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', file);

            document.getElementById('btn-save-cloud').innerText = "☁️ Guardando...";
            
            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken }),
                    body: form
                });
                if(response.ok) {
                    alert("¡Plano guardado exitosamente en tu Google Drive!");
                } else {
                    alert("Hubo un error al guardar.");
                }
            } catch (err) {
                console.error(err);
                alert("Error de conexión con Google Drive.");
            }
            document.getElementById('btn-save-cloud').innerText = "☁️ Guardar en Drive";
        }

        async function cargarDeDrive() {
            if (!driveAccessToken) return alert("Debes iniciar sesión primero.");
            
            document.getElementById('btn-load-cloud').innerText = "📂 Buscando...";
            
            try {
                // Buscar archivos JSON creados por la app
                let response = await gapi.client.drive.files.list({
                    pageSize: 10,
                    fields: 'files(id, name)',
                    q: "mimeType='application/json' and trashed=false"
                });
                
                const files = response.result.files;
                if (!files || files.length == 0) {
                    alert('No tienes planos guardados en Drive aún.');
                    document.getElementById('btn-load-cloud').innerText = "📂 Abrir desde Drive";
                    return;
                }
                
                // Simulación de menú de selección rápida
                let lista = "Selecciona el número del plano a abrir:\n\n";
                files.forEach((f, i) => lista += `${i + 1}. ${f.name}\n`);
                
                let eleccion = prompt(lista);
                let indice = parseInt(eleccion) - 1;
                
                if (eleccion && files[indice]) {
                    const fileId = files[indice].id;
                    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                        headers: new Headers({ 'Authorization': 'Bearer ' + driveAccessToken })
                    });
                    const jsonPlano = await fileRes.text();
                    
                    canvas.loadFromJSON(jsonPlano, function() {
                        canvas.renderAll();
                        alert(`Plano ${files[indice].name} cargado correctamente.`);
                    });
                }
            } catch (err) {
                console.error(err);
                alert("Error al intentar leer Google Drive.");
            }
            document.getElementById('btn-load-cloud').innerText = "📂 Abrir desde Drive";
        }

        // --- 3. LÓGICA DE DIBUJO (FABRIC.JS) ---
        var canvas;
        var selectedObject = null;
        var menu = document.getElementById('context-menu');

        window.onload = function() {
            canvas = new fabric.Canvas('c', { fireRightClick: true, stopContextMenu: true, backgroundColor: '#ffffff' });
            fabric.Object.prototype.perPixelTargetFind = true;
            
            canvas.on('mouse:down', function(options) {
                if (options.button === 3 && options.target) {
                    selectedObject = options.target;
                    canvas.setActiveObject(selectedObject);
                    menu.style.display = 'block';
                    menu.style.left = options.e.clientX + 'px';
                    menu.style.top = options.e.clientY + 'px';
                } else {
                    menu.style.display = 'none';
                }
            });
        };

        function ejecutarAccion(tipo) {
            if (!selectedObject) return;
            switch(tipo) {
                case 'frente': selectedObject.bringToFront(); break;
                case 'fondo': selectedObject.sendToBack(); break;
                case 'borrar': canvas.remove(selectedObject); canvas.discardActiveObject(); break;
            }
            canvas.renderAll();
            menu.style.display = 'none';
        }

        function addIsoBlock() {
            const f = new fabric.Rect({ width: 200, height: 100, fill: '#fff', stroke: '#444', strokeWidth: 2 });
            const s = new fabric.Polygon([{x:200,y:0},{x:260,y:-40},{x:260,y:60},{x:200,y:100}], {fill:'#f0f0f0', stroke:'#444', strokeWidth:2});
            const t = new fabric.Polygon([{x:0,y:0},{x:60,y:-40},{x:260,y:-40},{x:200,y:0}], {fill:'#fcfcfc', stroke:'#444', strokeWidth:2});
            const group = new fabric.Group([f, s, t], { left: 150, top: 150 });
            canvas.add(group); canvas.sendToBack(group);
        }

        function addDivider() { canvas.add(new fabric.Line([0, 0, 0, 100], { stroke: '#444', strokeWidth: 2, left: 250, top: 200, strokeDashArray: [5, 5] })); }
        function addDoor() { canvas.add(new fabric.Rect({ width: 35, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2, left: 180, top: 190 })); }
        function addGarage() { 
            const g = new fabric.Group([new fabric.Rect({ width: 80, height: 60, fill: '#fff', stroke: '#444', strokeWidth: 2 }), new fabric.Line([0, 15, 80, 15], { stroke: '#444', strokeWidth: 1 })], { left: 160, top: 190 });
            canvas.add(g); 
        }
        function addStairs() { 
            const steps = [0,1,2].map(i => new fabric.Rect({ width: 40, height: 8, fill: '#fff', stroke: '#444', top: i*8 }));
            canvas.add(new fabric.Group(steps, { left: 250, top: 220 }));
        }
        function addText() { canvas.add(new fabric.IText('Etiqueta', { left: 200, top: 160, fontSize: 16, fontFamily: 'Arial', fontWeight: 'bold', fill: '#288041' })); }
        
        function limpiarHoja() { if(confirm("¿Limpiar todo?")) { canvas.clear(); canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas)); } }
        function exportar() { canvas.discardActiveObject().renderAll(); const link = document.createElement('a'); link.download = 'Plano.png'; link.href = canvas.toDataURL({ format: 'png', multiplier: 2 }); link.click(); }

        // Teclado
        document.addEventListener('keydown', (e) => {
            const obj = canvas.getActiveObject();
            if (obj && obj.isEditing) return;
            if(e.key === "Backspace" && e.target.tagName !== 'INPUT') e.preventDefault();
            if (!obj) return;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
            if(e.key === "Delete" || e.key === "Backspace") { canvas.remove(obj); canvas.discardActiveObject(); canvas.renderAll(); return; }
            const step = 5; 
            if(e.key === "ArrowUp") obj.top -= step;
            if(e.key === "ArrowDown") obj.top += step;
            if(e.key === "ArrowLeft") obj.left -= step;
            if(e.key === "ArrowRight") obj.left += step;
            obj.setCoords(); canvas.renderAll();
        });
    </script>
</body>
</html>
